<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share files</title>
    <style>
        body{
            padding-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
            text-transform: capitalize;
        }
        #share{
            display: flex;
            flex-direction: column;
            border: 1px solid gray;
            border-radius: 10px;
            width: 80%;
            align-items: center;
            justify-content: center;
            margin: auto;
            gap: 10px;
            padding-bottom: 10px;

        }
        #submit{
            color: white;
            background-color:   rgb(73, 214, 73);
            padding: 10px;
            border-radius: 15px;
            width: 80%;
            height: auto;
            border: 1px solid gray;
            font-size: medium;
        }
        #submit:hover{
            background-color: rgb(238, 59, 59);
        }
        #file-upload {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
        /* Style the label as a custom button */
        .custom-file-upload {
            display: inline-block;
            padding: 12px 24px;
            background-color: white; /* Blue */
            color: rgb(16, 1, 1);
            font-family: 'Arial', sans-serif;
            font-size: 16px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        
        /* Hover state */
        .custom-file-upload:hover {
            color: red;
        }
        .progress{
            margin-top: 50px;
            width: 80%;
            height: 30px;
            border: 1px solid grey;
            border-radius: 30px;
            display: flex;
            flex-direction: row;
        }
        .p1{
            display: flex;
            background-color: rgb(27, 212, 27);
            width: 30%;
            height: 100%;
            border-radius: 30px 0 0 30px;
            align-items: center;
            color: rgb(255, 255, 255);
        }
        #pval{
            position: relative;
            left: 80%;
        }
    </style>
    <script>
        function progress(){
            let val = 20;

            
        }
    </script>
</head>
<body>
    <form id="share" method="post" enctype="multipart/form-data">
        <h3>Please select the file</h3>
        <input type="file" name="file" id="file-upload">
        <label for="file-upload" class="custom-file-upload">
            Select Files
        </label>
        <input type="submit" value="submit" id="submit">
    </form>
    <h3>Progress</h3>
    <div class="progress">
        <div class="p1">
            <p id="pval">30</p>
        </div>
        <div class="p2">
            
        </div>
        
    </div>
    
</body>
</html>
