<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share files</title>
    <style>
        body{
            background: linear-gradient(to bottom right, rgb(204, 0, 255), rgb(19, 231, 97));
            height: 100vh;
            color: rgb(255, 252, 252);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
            text-transform: capitalize;
        }
        .send,.recieve{
            background-color: white;
            color: black;
            display: flex;
            flex-direction: column;
            border: 1px solid gray;
            border-radius: 10px;
            width: 80%;
            align-items: center;
            justify-content: center;
            margin: auto;
            gap: 10px;
            padding-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .recieve{
            display: none;
        }
        #submit{
            color: white;
            background-color:   rgb(73, 214, 73);
            padding: 10px;
            border-radius: 15px;
            width: 80%;
            height: auto;
            border: 1px solid gray;
            font-size: medium;
        }
        #submit:hover{
            background-color: rgb(238, 59, 59);
        }
        #file-upload {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
        /* Style the label as a custom button */
        .custom-file-upload {
            display: inline-block;
            padding: 12px 24px;
            background-color: white; /* Blue */
            color: rgb(16, 1, 1);
            font-family: 'Arial', sans-serif;
            font-size: 16px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        
        /* Hover state */
        .custom-file-upload:hover {
            color: red;
        }
        .progress{
            margin-top: 5px;
            width: 80%;
            height: 30px;
            border: 1px solid grey;
            border-radius: 30px;
            display: flex;
            flex-direction: row;
        }
        .p1{
            display: flex;
            background-color: rgb(31, 207, 31);
            width: 30%;
            height: 100%;
            border-radius: 30px 0 0 30px;
            align-items: center;
            color: rgb(255, 255, 255);
        }
        #pval{
            position: sticky;
            left: 90%;
        }
        #switch{
            background: none;
            color: white;
            border: none;
            margin-left: 80%;
            margin-bottom: 20px;
            font-size: medium;

        }
        #switch:hover{
            text-decoration: underline;
            color: red;
        }
        .qr{
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 150px;
            height: 175px;
            border-radius: 10px;
            box-shadow: 
                        0 4px 6px rgba(0,0,0,0.1),
                        0 10px 15px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }
        .qr:hover{
            transform: translateY(-6px) scale(1.02);
            box-shadow: 
                0 8px 12px rgba(0,0,0,0.15),
                0 20px 25px rgba(0,0,0,0.25);
        }
        @media screen and (min-width : 600px) {
            .send,.recieve{
                width: 40%;
            }
            
        }
    </style>
</head>
<body>
    <button id="switch" onclick="switchDiv()">recieve</button>
    <form class="send" action="/upload" method="post" enctype="multipart/form-data">
        <h2>Send Files</h2>
        <h3>Please select the file</h3>
        <input type="file" name="file" id="file-upload">
        <label for="file-upload" class="custom-file-upload">
            Select Files
        </label>
        <input type="submit" value="submit" id="submit">
    </form>
    <div class="recieve">
        <h2>recieve Files</h2>
        <h3 id="qr_h3">Please wait for the Qr code</h3>
        <div class="qr">
            <!--  qr placeholder -->
            <img id="qr_img" src="" width="150px" alt="QR Code">
        </div>
        
    </div>


    <h3>Progress</h3>
    <div class="progress">
        <div class="p1">
            <p id="pval">30</p>
        </div> 
    </div>
    <h3>Speed</h3>
    <p id="speed"></p>
    <script>
        


        // progress bar funtion
         async function progress(value){
            if (value > 90){
                document.querySelector(".p1").style.borderRadius = "30px" ;

            }
            value += "%";
            document.querySelector(".p1").style.width = value ;
            document.getElementById("pval").textContent =value;
            await sleep(1000);

        }
        // switch change
        function caseValue(value,value2){
            document.getElementById("switch").innerHTML = value;
            document.querySelector("."+ value).style.display = "none";
            document.querySelector("."+ value2).style.display = "flex";

        }

        // recieve  function
        function switchDiv(){
            let current = document.getElementById("switch").innerHTML;
            switch(current){
                case "recieve":
                    caseValue("send",current);

                    break;
                case "send":
                    caseValue("recieve",current);
                    break;
                default:
                    caseValue("recieve",current);
                    break;
            }

        }
        // fetch qr 
        function showQr(){
            document.getElementById("qr_h3").innerHTML = "Scan the Qr to connect";
            document.getElementById("qr_img").src = "/qr?" +Date.now();
            
        }

        // test call for image show
        showQr();

        // delay function
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // dummy call for function to display progress
        progress(91);

        // dummy speed
        document.getElementById("speed").innerText = "30kbps";
    </script>
</body>
</html>
