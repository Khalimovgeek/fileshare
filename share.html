<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share files</title>
    <style>
        body{
            font-family: sans-serif;
            text-transform: capitalize;
        }
        #share{
            display: flex;
            flex-direction: column;
            border: 1px solid gray;
            border-radius: 10px;
            width: 80%;
            align-items: center;
            justify-content: center;
            margin: auto;
            gap: 10px;
            padding-bottom: 10px;

        }
        #submit{
            color: white;
            background-color:   rgb(73, 214, 73);
            padding: 10px;
            border-radius: 15px;
            width: 80%;
            height: auto;
            border: 1px solid gray;
            font-size: medium;
        }
        #submit:hover{
            background-color: rgb(238, 59, 59);
        }
        #file-upload {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
        /* Style the label as a custom button */
        .custom-file-upload {
            display: inline-block;
            padding: 12px 24px;
            background-color: white; /* Blue */
            color: rgb(16, 1, 1);
            font-family: 'Arial', sans-serif;
            font-size: 16px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        
        /* Hover state */
        .custom-file-upload:hover {
            color: red;
        }
    </style>
</head>
<body>
    <form id="share" method="post" enctype="multipart/form-data">
        <h3>Please select the file</h3>
        <input type="file" name="file" id="file-upload">
        <label for="file-upload" class="custom-file-upload">
            Select Files
        </label>
        <input type="submit" value="submit" id="submit">
    </form>
    
</body>
</html>
